<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Usuarios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Gestión de Usuarios</h1>

  <!-- Formulario de Registro -->
  <section>
    <h2>Registro</h2>
    <form id="formRegistro">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required minlength="3">

      <label for="email">Correo:</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required minlength="6">

      <button type="submit">Registrar</button>
    </form>
  </section>

  <!-- Formulario de Edición -->
  <section>
    <h2>Editar Usuario</h2>
    <form id="formEditar">
      <label for="idEditar">ID:</label>
      <input type="number" id="idEditar" name="idEditar" required>

      <label for="nombreEditar">Nombre:</label>
      <input type="text" id="nombreEditar" name="nombreEditar" required>

      <label for="emailEditar">Correo:</label>
      <input type="email" id="emailEditar" name="emailEditar" required>

      <button type="submit">Actualizar</button>
    </form>
  </section>

  <!-- Formulario de Búsqueda -->
  <section>
    <h2>Buscar Usuario</h2>
    <form id="formBuscar">
      <label for="nombreBuscar">Nombre:</label>
      <input type="text" id="nombreBuscar" name="nombreBuscar" required>
      <button type="submit">Buscar</button>
    </form>
    <div id="resultadoBusqueda"></div>
  </section>

  <!-- Formulario de Eliminación -->
  <section>
    <h2>Eliminar Usuario</h2>
    <form id="formEliminar">
      <label for="idEliminar">ID:</label>
      <input type="number" id="idEliminar" name="idEliminar" required>
      <button type="submit">Eliminar</button>
    </form>
  </section>

  <script>
    // Registro
    document.getElementById("formRegistro").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        nombre: e.target.nombre.value,
        email: e.target.email.value,
        password: e.target.password.value
      };
      const res = await fetch("http://localhost:3000/api/usuarios", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      alert(JSON.stringify(await res.json()));
    });

    // Edición
    document.getElementById("formEditar").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = e.target.idEditar.value;
      const data = {
        nombre: e.target.nombreEditar.value,
        email: e.target.emailEditar.value
      };
      const res = await fetch(`http://localhost:3000/api/usuarios/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      alert(JSON.stringify(await res.json()));
    });

    // Búsqueda
    document.getElementById("formBuscar").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nombre = e.target.nombreBuscar.value;
      const res = await fetch(`http://localhost:3000/api/usuarios?nombre=${nombre}`);
      document.getElementById("resultadoBusqueda").innerText = JSON.stringify(await res.json());
    });

    // Eliminación
    document.getElementById("formEliminar").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = e.target.idEliminar.value;
      const res = await fetch(`http://localhost:3000/api/usuarios/${id}`, { method: "DELETE" });
      alert(res.status === 204 ? "Usuario eliminado" : "Error al eliminar");
    });
  </script>
</body>
</html>
